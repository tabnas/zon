# Staged CI caller — org-standard replacement for .github/workflows/build.yml.
# Promoted by a maintainer via tabnas/admin rollout/apply-ci-folders.sh
# (session credentials cannot write .github/workflows/*; admin DECISIONS.md ADR-8).
name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    uses: tabnas/.github/.github/workflows/polyglot-ci.yml@main
    with:
      deps: "parser debug json abnf railroad jsonic"
