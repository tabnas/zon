name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Use LF line endings
      run: git config --global core.autocrlf false
    - uses: actions/checkout@v4
      with:
        path: zon
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        for dep in parser debug json abnf railroad jsonic; do
          git clone --depth 1 "https://github.com/tabnas/$dep.git" "$dep"
        done
    - name: Build (dependencies, then this repo)
      shell: bash
      run: |
        set -e
        for pkg in parser debug json abnf railroad jsonic zon; do
          ( cd "$pkg/ts" && npm i && npm run build --if-present )
        done
    - name: Test
      shell: bash
      working-directory: zon/ts
      run: npm test

  build-go:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        path: zon
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        for dep in parser debug json abnf railroad jsonic; do
          git clone --depth 1 "https://github.com/tabnas/$dep.git" "$dep"
        done
    # Mirror admin/scripts/link.sh: vendor symlinks for ../vendor/ replaces,
    # then a go.work over every module EXCEPT those vendor-replaced ones.
    - name: Set up go workspace
      shell: bash
      run: |
        set -e
        for gm in $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/node_modules/*'); do
          grep -E '^[[:space:]]*replace .*=>[[:space:]]*\.\./vendor/' "$gm" | while read -r line; do
            v=$(printf '%s' "$line" | sed -E 's#.*\.\./vendor/([^/]+)/go.*#\1#')
            dep=$(printf '%s' "$line" | awk '{print $2}' | sed -E 's#github.com/tabnas/([^/]+)/go#\1#')
            repodir=$(dirname "$(dirname "$gm")")
            mkdir -p "$repodir/vendor"
            ln -snf "$(cd "$dep" && pwd)" "$repodir/vendor/$v"
          done
        done
        go work init
        for gm in $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/node_modules/*'); do
          grep -qE '^[[:space:]]*replace .*=>[[:space:]]*\.\./vendor/' "$gm" && continue
          go work use "$(dirname "$gm")"
        done
    - name: Build
      working-directory: zon/go
      run: go build ./...
    - name: Test
      working-directory: zon/go
      run: go test -v ./...
