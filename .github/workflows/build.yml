name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Use LF line endings
      run: git config --global core.autocrlf false
    - uses: actions/checkout@v4
      with:
        path: zon
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    # The @tabnas siblings are not published to npm; clone them so the
    # file: dependencies resolve, then build everything (this repo included)
    # in dependency order so each package sees its built dependencies.
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        for dep in parser debug json abnf railroad jsonic; do
          git clone --depth 1 "https://github.com/tabnas/$dep.git" "$dep"
        done
    - name: Build (dependencies, then this repo)
      shell: bash
      run: |
        set -e
        for pkg in parser debug json abnf railroad jsonic zon; do
          ( cd "$pkg/ts" && npm i && npm run build --if-present )
        done
    - name: Test
      shell: bash
      working-directory: zon/ts
      run: npm test

  build-go:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Use LF line endings
      run: git config --global core.autocrlf false
    - uses: actions/checkout@v4
      with:
        path: zon
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    # The go module replaces ../../<dep>/go for unpublished sibling ports;
    # clone them so the local replace directives resolve.
    - name: Clone tabnas dependencies
      shell: bash
      run: |
        set -e
        for dep in parser debug json abnf railroad jsonic; do
          git clone --depth 1 "https://github.com/tabnas/$dep.git" "$dep"
        done
    - name: Build
      working-directory: zon/go
      run: go build ./...
    - name: Test
      working-directory: zon/go
      run: go test -v ./...
