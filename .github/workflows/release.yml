# Publishes this repo's @tabnas/* package to npm on a `ts/v*` tag push, via
# GitHub OIDC Trusted Publishing (no token). Build + test run against the
# ALREADY-PUBLISHED dependency versions — this is the publication gate, so a
# failing build never publishes. Go modules are served by the module proxy
# from the `go/v*` tag directly (no step here). Driven by admin/publish.sh.
name: release

on:
  push:
    tags:
      - 'ts/v*'

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Build, test, and publish to npm (OIDC trusted publishing)
        working-directory: ts
        run: |
          npm install -g npm@latest
          npm i
          npm run build --if-present
          npm test
          npm publish --access public
